<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Silent Camera</title>
<style>
  :root{
    --accent:#ffd60a;      /* iOS風アクティブ黄 */
    --ctrl-bg:rgba(20,20,22,.55);
    --ctrl-bg-active:rgba(255,214,10,.95);
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif;
    color:#fff;user-select:none;-webkit-user-select:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---------- カメラ表示 ---------- */
  #stage{position:relative;flex:1;overflow:hidden;background:#000;
    touch-action:none;}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transform-origin:center center;transition:opacity .25s ease;}
  #video.mirror{transform:scaleX(-1);}
  #stage.switching #video{opacity:0;}

  /* グリッド */
  #grid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;}
  #grid.on{opacity:1;}
  #grid::before,#grid::after{content:"";position:absolute;background:rgba(255,255,255,.35);}
  #grid .v,#grid .h{position:absolute;background:rgba(255,255,255,.35);}
  #grid .v{width:1px;height:100%;}
  #grid .h{height:1px;width:100%;}

  /* シャッターのフラッシュ演出 */
  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;}
  #flash.fire{animation:flash .32s ease;}
  @keyframes flash{0%{opacity:0}12%{opacity:.9}100%{opacity:0}}

  /* タイマーのカウント表示 */
  #count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-size:34vw;font-weight:200;color:rgba(255,255,255,.9);
    text-shadow:0 2px 30px rgba(0,0,0,.5);pointer-events:none;}
  #count.show{display:flex;}

  /* ズーム表示ピル */
  #zoom{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
    background:var(--ctrl-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    padding:7px 14px;border-radius:20px;font-size:14px;font-weight:600;
    color:var(--accent);opacity:0;transition:opacity .25s;}
  #zoom.show{opacity:1;}

  /* ---------- 上部バー ---------- */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:5;
    padding:calc(var(--safe-top) + 10px) 16px 14px;
    display:flex;align-items:center;justify-content:center;gap:14px;
    background:linear-gradient(to bottom,rgba(0,0,0,.45),transparent);}
  .pill{width:42px;height:42px;border-radius:50%;border:none;
    background:var(--ctrl-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .12s, background .15s;}
  .pill:active{transform:scale(.88);}
  .pill.active{background:var(--ctrl-bg-active);}
  .pill.active svg{stroke:#000;fill:#000;}
  .pill svg{width:21px;height:21px;stroke:#fff;fill:none;stroke-width:1.7;}
  .pill[hidden]{display:none;}
  .pill .timerlabel{position:absolute;font-size:10px;font-weight:700;color:var(--accent);
    transform:translate(13px,11px);}
  .pill.active .timerlabel{color:#000;}

  /* ---------- 下部バー ---------- */
  #bottombar{position:relative;z-index:5;
    padding:18px 0 calc(var(--safe-bottom) + 18px);
    background:#000;
    display:flex;align-items:center;justify-content:space-around;}
  /* サムネイル */
  #thumb{width:54px;height:54px;border-radius:11px;overflow:hidden;
    background:#1c1c1e;border:1px solid rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .12s;}
  #thumb:active{transform:scale(.9);}
  #thumb img{width:100%;height:100%;object-fit:cover;}
  #thumb .badge{position:absolute;transform:translate(20px,-20px);
    background:var(--accent);color:#000;font-size:11px;font-weight:700;
    min-width:18px;height:18px;border-radius:9px;display:flex;
    align-items:center;justify-content:center;padding:0 5px;}
  /* シャッター */
  #shutter{width:74px;height:74px;border-radius:50%;background:transparent;
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
    position:relative;}
  #shutter::before{content:"";position:absolute;inset:0;border-radius:50%;
    border:4px solid #fff;}
  #shutter::after{content:"";width:60px;height:60px;border-radius:50%;background:#fff;
    transition:transform .12s, width .12s, height .12s;}
  #shutter:active::after{transform:scale(.88);}
  /* 反転ボタン */
  #flip{width:54px;height:54px;border-radius:50%;border:none;
    background:#1c1c1e;display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .35s;}
  #flip:active{transform:rotate(180deg);}
  #flip svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.7;}

  /* ---------- スタート画面 / エラー ---------- */
  #start{position:absolute;inset:0;z-index:20;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;gap:22px;}
  #start h1{font-size:25px;font-weight:600;letter-spacing:.02em;}
  #start .sub{font-size:14px;line-height:1.7;color:#9a9a9e;max-width:300px;}
  #start .cam-ic{width:64px;height:64px;stroke:var(--accent);fill:none;stroke-width:1.6;}
  #startBtn{margin-top:6px;background:var(--accent);color:#000;border:none;
    font-size:17px;font-weight:600;padding:15px 40px;border-radius:30px;cursor:pointer;
    transition:transform .12s;}
  #startBtn:active{transform:scale(.95);}
  #err{display:none;color:#ff6b6b;font-size:14px;line-height:1.7;max-width:320px;}

  /* ---------- レビュー / ギャラリー ---------- */
  #review{position:fixed;inset:0;z-index:30;background:#000;display:none;
    flex-direction:column;}
  #review.show{display:flex;}
  #revtop{display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-top) + 12px) 18px 12px;}
  #revtop button{background:none;border:none;color:var(--accent);font-size:17px;
    cursor:pointer;padding:6px;}
  #revtop .count{color:#fff;font-size:15px;font-weight:500;}
  #revstage{flex:1;overflow-x:auto;display:flex;scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;}
  #revstage::-webkit-scrollbar{display:none;}
  #revstage .slide{min-width:100%;scroll-snap-align:center;display:flex;
    align-items:center;justify-content:center;}
  #revstage .slide img{max-width:100%;max-height:100%;object-fit:contain;}
  #revbottom{display:flex;align-items:center;justify-content:space-around;
    padding:18px 0 calc(var(--safe-bottom) + 18px);}
  .revbtn{background:none;border:none;display:flex;flex-direction:column;gap:5px;
    align-items:center;color:#fff;font-size:11px;cursor:pointer;padding:6px 20px;
    transition:transform .12s;}
  .revbtn:active{transform:scale(.9);}
  .revbtn svg{width:25px;height:25px;stroke:#fff;fill:none;stroke-width:1.7;}
  .revbtn.del{color:#ff6b6b;}
  .revbtn.del svg{stroke:#ff6b6b;}
  #revempty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    color:#6a6a6e;font-size:15px;}

  /* トースト */
  #toast{position:fixed;bottom:calc(var(--safe-bottom) + 110px);left:50%;
    transform:translateX(-50%) translateY(20px);z-index:40;
    background:rgba(40,40,42,.95);backdrop-filter:blur(10px);
    color:#fff;font-size:14px;padding:11px 20px;border-radius:22px;
    opacity:0;pointer-events:none;transition:.3s;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div id="grid"><span class="v" style="left:33.33%"></span><span class="v" style="left:66.66%"></span><span class="h" style="top:33.33%"></span><span class="h" style="top:66.66%"></span></div>
    <div id="flash"></div>
    <div id="count"></div>
    <div id="zoom">1.0×</div>

    <div id="topbar">
      <button class="pill" id="btnTorch" hidden aria-label="ライト">
        <svg viewBox="0 0 24 24"><path d="M9 2h6l-1 9h3l-8 11 1.5-8H7z"/></svg>
      </button>
      <button class="pill" id="btnGrid" aria-label="グリッド">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      </button>
      <button class="pill" id="btnTimer" aria-label="タイマー">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg>
        <span class="timerlabel" id="timerLabel"></span>
      </button>
    </div>
  </div>

  <div id="bottombar">
    <div id="thumb" aria-label="撮影した写真">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5a5a5e" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </div>
    <button id="shutter" aria-label="撮影"></button>
    <button id="flip" aria-label="カメラ切替">
      <svg viewBox="0 0 24 24"><path d="M21 8a9 9 0 0 0-15-3L3 8M3 8V3M3 8h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3M21 16v5M21 16h-5"/></svg>
    </button>
  </div>

  <!-- スタート画面 -->
  <div id="start">
    <svg class="cam-ic" viewBox="0 0 24 24"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L17 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="4"/></svg>
    <h1>Silent Camera</h1>
    <p class="sub">シャッター音の鳴らないカメラです。<br>下のボタンを押すとカメラへのアクセスを確認します。</p>
    <button id="startBtn">カメラを起動</button>
    <p id="err"></p>
  </div>
</div>

<!-- レビュー / ギャラリー -->
<div id="review">
  <div id="revtop">
    <button id="revClose">完了</button>
    <span class="count" id="revCount"></span>
    <span style="width:48px"></span>
  </div>
  <div id="revstage"></div>
  <div id="revempty">写真がありません</div>
  <div id="revbottom">
    <button class="revbtn" id="revSave">
      <svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
      写真に保存
    </button>
    <button class="revbtn del" id="revDel">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>
      削除
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const video=$("video"), stage=$("stage"), startScreen=$("start"),
        startBtn=$("startBtn"), errEl=$("err"),
        flashEl=$("flash"), countEl=$("count"), zoomEl=$("zoom"),
        thumb=$("thumb"), shutter=$("shutter"), flip=$("flip"),
        btnTorch=$("btnTorch"), btnGrid=$("btnGrid"), btnTimer=$("btnTimer"),
        timerLabel=$("timerLabel"), gridEl=$("grid"), toastEl=$("toast"),
        review=$("review"), revstage=$("revstage"), revCount=$("revCount"),
        revClose=$("revClose"), revSave=$("revSave"), revDel=$("revDel"),
        revEmpty=$("revempty");

  let stream=null, track=null, facing="environment",
      zoom=1, maxZoom=5, torchOn=false,
      timerMode=0, timers=[0,3,10],
      photos=[]; // {url, blob}

  /* ---------- トースト ---------- */
  let toastT;
  function toast(msg){
    toastEl.textContent=msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),1800);
  }

  /* ---------- カメラ起動 ---------- */
  async function startCamera(){
    if(!window.isSecureContext){
      showError("カメラを使うにはHTTPS環境で開く必要があります。Safariで https:// のページから開いてください。");
      return;
    }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showError("このブラウザはカメラに対応していません。");
      return;
    }
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop());
      stage.classList.add("switching");
      const constraints={
        audio:false,
        video:{
          facingMode:{ideal:facing},
          width:{ideal:4096}, height:{ideal:2160}
        }
      };
      stream=await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject=stream;
      track=stream.getVideoTracks()[0];
      await video.play().catch(()=>{});
      // 前面はミラー表示
      video.classList.toggle("mirror", facing==="user");
      // 機能ケイパビリティ
      setupCapabilities();
      // ズームリセット
      zoom=1; applyZoom();
      startScreen.style.display="none";
      setTimeout(()=>stage.classList.remove("switching"),60);
    }catch(e){
      stage.classList.remove("switching");
      if(e && (e.name==="NotAllowedError"||e.name==="SecurityError")){
        showError("カメラへのアクセスが許可されませんでした。設定 > Safari > カメラ を確認してください。");
      }else if(e && e.name==="NotFoundError"){
        showError("カメラが見つかりませんでした。");
      }else{
        showError("カメラを起動できませんでした: "+(e && e.message || e));
      }
    }
  }
  function showError(msg){
    startScreen.style.display="flex";
    errEl.style.display="block"; errEl.textContent=msg;
  }

  function setupCapabilities(){
    torchOn=false; btnTorch.classList.remove("active");
    let caps={};
    try{ caps=track.getCapabilities ? track.getCapabilities() : {}; }catch(e){}
    // ライト(背面のみ・対応端末のみ)
    btnTorch.hidden = !(caps.torch && facing==="environment");
    // ハード光学ズームが取れるなら上限を反映、無ければデジタル
    if(caps.zoom && caps.zoom.max){ maxZoom=Math.min(caps.zoom.max,8); }
    else { maxZoom=5; }
  }

  /* ---------- ズーム(光学優先・無ければデジタル) ---------- */
  function applyZoom(){
    zoom=Math.max(1,Math.min(maxZoom,zoom));
    let optical=false;
    try{
      const caps=track && track.getCapabilities ? track.getCapabilities() : {};
      if(caps.zoom && caps.zoom.max){
        track.applyConstraints({advanced:[{zoom:zoom}]});
        optical=true;
        video.style.transform = facing==="user" ? "scaleX(-1)" : "";
      }
    }catch(e){}
    if(!optical){
      // デジタルズーム：表示をスケール
      const sx = facing==="user" ? -1 : 1;
      video.style.transform=`scale(${zoom})`+(sx===-1?" scaleX(-1)":"");
    }
    zoomEl.textContent=zoom.toFixed(1)+"×";
    zoomEl.classList.add("show");
    clearTimeout(applyZoom._t);
    applyZoom._t=setTimeout(()=>zoomEl.classList.remove("show"),1100);
  }

  // ピンチズーム
  let pinchStart=0, pinchBase=1;
  stage.addEventListener("touchstart",e=>{
    if(e.touches.length===2){ pinchStart=dist(e.touches); pinchBase=zoom; }
  },{passive:true});
  stage.addEventListener("touchmove",e=>{
    if(e.touches.length===2 && pinchStart){
      const d=dist(e.touches);
      zoom=pinchBase*(d/pinchStart); applyZoom();
      e.preventDefault();
    }
  },{passive:false});
  stage.addEventListener("touchend",e=>{ if(e.touches.length<2) pinchStart=0; });
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}

  // ダブルタップで 1× / 2× トグル
  let lastTap=0;
  stage.addEventListener("touchend",e=>{
    if(e.touches.length>0) return;
    const now=Date.now();
    if(now-lastTap<280){ zoom = zoom>1.5 ? 1 : 2; applyZoom(); }
    lastTap=now;
  });

  /* ---------- 撮影(無音) ---------- */
  function doCapture(){
    if(!track){ return; }
    const vw=video.videoWidth, vh=video.videoHeight;
    if(!vw||!vh){ toast("カメラ準備中です"); return; }
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");
    // デジタルズーム分を中央クロップ
    let opticalZoom=false;
    try{
      const caps=track.getCapabilities?track.getCapabilities():{};
      opticalZoom = !!(caps.zoom && caps.zoom.max);
    }catch(e){}
    const z = opticalZoom ? 1 : zoom;
    const cw=vw/z, ch=vh/z;
    const sx=(vw-cw)/2, sy=(vh-ch)/2;
    canvas.width=cw; canvas.height=ch;
    if(facing==="user"){ ctx.translate(cw,0); ctx.scale(-1,1); } // 見たままミラーで保存
    ctx.drawImage(video, sx, sy, cw, ch, 0, 0, cw, ch);

    flashEl.classList.remove("fire"); void flashEl.offsetWidth; flashEl.classList.add("fire");
    if(navigator.vibrate) navigator.vibrate(8);

    canvas.toBlob(blob=>{
      if(!blob){ toast("撮影に失敗しました"); return; }
      const url=URL.createObjectURL(blob);
      photos.unshift({url,blob});
      updateThumb();
    },"image/jpeg",0.95);
  }

  function capture(){
    if(timerMode===0){ doCapture(); return; }
    let n=timers[timerMode];
    countEl.classList.add("show"); countEl.textContent=n;
    const iv=setInterval(()=>{
      n--;
      if(n<=0){ clearInterval(iv); countEl.classList.remove("show"); doCapture(); }
      else countEl.textContent=n;
    },1000);
  }

  /* ---------- サムネイル ---------- */
  function updateThumb(){
    thumb.innerHTML="";
    if(photos.length){
      const img=document.createElement("img"); img.src=photos[0].url; thumb.appendChild(img);
      if(photos.length>1){
        const b=document.createElement("span"); b.className="badge"; b.textContent=photos.length;
        thumb.appendChild(b);
      }
    }else{
      thumb.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5a5a5e" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
    }
  }

  /* ---------- レビュー / ギャラリー ---------- */
  function openReview(){
    if(!photos.length){ toast("まだ写真がありません"); return; }
    renderReview(); review.classList.add("show");
    revstage.scrollLeft=0;
  }
  function renderReview(){
    revstage.innerHTML="";
    if(!photos.length){ revEmpty.style.display="flex"; revCount.textContent=""; return; }
    revEmpty.style.display="none";
    photos.forEach(p=>{
      const s=document.createElement("div"); s.className="slide";
      const img=document.createElement("img"); img.src=p.url; s.appendChild(img);
      revstage.appendChild(s);
    });
    updateRevCount();
  }
  function currentIndex(){
    return Math.round(revstage.scrollLeft/revstage.clientWidth);
  }
  function updateRevCount(){
    revCount.textContent=`${Math.min(currentIndex()+1,photos.length)} / ${photos.length}`;
  }
  revstage.addEventListener("scroll",()=>{ if(photos.length) updateRevCount(); });
  revClose.addEventListener("click",()=>review.classList.remove("show"));

  // 保存(iOSは共有シート経由で「写真に保存」)
  async function savePhoto(){
    if(!photos.length) return;
    const p=photos[currentIndex()];
    const fname="photo_"+Date.now()+".jpg";
    const file=new File([p.blob],fname,{type:"image/jpeg"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file]}); }
      catch(e){ /* キャンセルは無視 */ }
    }else{
      const a=document.createElement("a"); a.href=p.url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove();
      toast("ダウンロードしました");
    }
  }
  revSave.addEventListener("click",savePhoto);

  revDel.addEventListener("click",()=>{
    if(!photos.length) return;
    const i=currentIndex();
    URL.revokeObjectURL(photos[i].url);
    photos.splice(i,1);
    updateThumb();
    if(!photos.length){ review.classList.remove("show"); return; }
    renderReview();
    revstage.scrollLeft=Math.min(i,photos.length-1)*revstage.clientWidth;
  });

  /* ---------- 上部ボタン ---------- */
  btnGrid.addEventListener("click",()=>{
    gridEl.classList.toggle("on");
    btnGrid.classList.toggle("active",gridEl.classList.contains("on"));
  });

  btnTimer.addEventListener("click",()=>{
    timerMode=(timerMode+1)%3;
    if(timerMode===0){ btnTimer.classList.remove("active"); timerLabel.textContent=""; }
    else{ btnTimer.classList.add("active"); timerLabel.textContent=timers[timerMode]; }
  });

  btnTorch.addEventListener("click",async()=>{
    if(!track) return;
    torchOn=!torchOn;
    try{
      await track.applyConstraints({advanced:[{torch:torchOn}]});
      btnTorch.classList.toggle("active",torchOn);
    }catch(e){
      torchOn=false; toast("この端末ではライトを使えません");
    }
  });

  /* ---------- メイン操作 ---------- */
  shutter.addEventListener("click",capture);
  thumb.addEventListener("click",openReview);
  flip.addEventListener("click",()=>{
    facing = facing==="environment" ? "user" : "environment";
    startCamera();
  });
  startBtn.addEventListener("click",()=>{ errEl.style.display="none"; startCamera(); });

  // 画面回転・復帰時の再生維持
  document.addEventListener("visibilitychange",()=>{
    if(!document.hidden && video.srcObject) video.play().catch(()=>{});
  });
})();
</script>
</body>
</html>
