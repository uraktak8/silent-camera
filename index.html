<title>Sotto</title>
<style>
  :root{
    --ink:#0A0A0B;
    --ink-2:#141416;
    --surface:#1b1b1e;
    --glass:rgba(14,14,16,.55);
    --line:rgba(255,255,255,.10);
    --text:#F3F2EF;
    --text-dim:#86868B;
    --orange:#FF6A1A;
    --orange-bright:#FF8A3D;
    --orange-deep:#E5550A;
    --rec:#FF4438;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,monospace;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;overflow:hidden;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Helvetica Neue",sans-serif;
    user-select:none;-webkit-user-select:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}

  #stage{position:relative;flex:1;overflow:hidden;background:#000;touch-action:none;}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    transform-origin:center center;transition:opacity .3s ease;}
  #stage.switching #video{opacity:0;}

  /* ビューファインダーの角ブラケット */
  #frame{position:absolute;inset:16px;pointer-events:none;z-index:2;}
  #frame i{position:absolute;width:22px;height:22px;border:2px solid var(--orange);opacity:.62;}
  #frame i:nth-child(1){top:0;left:0;border-right:0;border-bottom:0;}
  #frame i:nth-child(2){top:0;right:0;border-left:0;border-bottom:0;}
  #frame i:nth-child(3){bottom:0;left:0;border-right:0;border-top:0;}
  #frame i:nth-child(4){bottom:0;right:0;border-left:0;border-top:0;}
  #stage.switching #frame{opacity:0;transition:opacity .2s;}

  #grid{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .2s;z-index:1;}
  #grid.on{opacity:1;}
  #grid .v,#grid .h{position:absolute;background:rgba(255,255,255,.26);}
  #grid .v{width:1px;height:100%;}
  #grid .h{height:1px;width:100%;}

  #flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:3;}
  #flash.fire{animation:flash .34s ease;}
  @keyframes flash{0%{opacity:0}12%{opacity:.82}100%{opacity:0}}

  #count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-family:"Space Grotesk",sans-serif;font-size:32vw;font-weight:500;color:var(--text);
    text-shadow:0 2px 40px rgba(0,0,0,.6);pointer-events:none;z-index:4;}
  #count.show{display:flex;}

  #rectime{position:absolute;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%);
    display:none;align-items:center;gap:8px;background:rgba(10,10,11,.6);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border:1px solid var(--line);padding:7px 15px;border-radius:10px;
    font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.06em;z-index:5;}
  #rectime.show{display:flex;}
  #rectime .dot{width:9px;height:9px;border-radius:50%;background:var(--rec);animation:blink 1.1s infinite;}
  @keyframes blink{50%{opacity:.25}}

  #zoom{position:absolute;left:50%;bottom:78px;transform:translateX(-50%);
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid var(--line);padding:6px 14px;border-radius:9px;
    font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.04em;
    color:var(--orange-bright);opacity:0;transition:opacity .25s;pointer-events:none;z-index:5;}
  #zoom.show{opacity:1;}

  #lenses{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);
    display:none;gap:5px;background:var(--glass);backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);border:1px solid var(--line);padding:5px;border-radius:24px;
    box-shadow:0 6px 24px rgba(0,0,0,.4);max-width:92vw;overflow:hidden;z-index:5;}
  #lenses.show{display:flex;}
  #lenses button{min-width:40px;height:40px;border-radius:50%;border:none;
    background:transparent;color:var(--text-dim);font-family:var(--mono);font-size:13px;font-weight:600;
    cursor:pointer;transition:.18s;padding:0 9px;}
  #lenses button.active{background:var(--orange);color:#0a0a0a;transform:scale(1.06);
    box-shadow:0 0 18px rgba(255,106,26,.55);}

  #topbar{position:absolute;top:0;left:0;right:0;z-index:6;
    padding:calc(var(--safe-top) + 12px) 18px 16px;
    display:flex;align-items:center;justify-content:center;gap:13px;
    background:linear-gradient(to bottom,rgba(10,10,11,.6),transparent);}
  .spacer{flex:1;}
  .pill{position:relative;width:42px;height:42px;border-radius:12px;border:1px solid var(--line);
    background:var(--glass);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .12s, background .18s, border-color .18s;}
  .pill:active{transform:scale(.86);}
  .pill.active{background:var(--orange);border-color:var(--orange);}
  .pill.active svg{stroke:#0a0a0a;fill:#0a0a0a;}
  .pill svg{width:21px;height:21px;stroke:var(--text);fill:none;stroke-width:1.6;}
  .pill[hidden]{display:none;}
  .pill .timerlabel{position:absolute;font-family:var(--mono);font-size:10px;font-weight:700;
    color:var(--orange-bright);transform:translate(13px,11px);}
  .pill.active .timerlabel{color:#0a0a0a;}

  #modeSwitch{display:flex;justify-content:center;gap:30px;padding:14px 0 6px;background:var(--ink);}
  #modeSwitch button{background:none;border:none;color:#6a6a6e;font-size:13px;font-weight:600;
    letter-spacing:.16em;text-transform:uppercase;cursor:pointer;padding:4px 4px 9px;position:relative;transition:.18s;}
  #modeSwitch button.active{color:var(--orange);}
  #modeSwitch button.active::after{content:"";position:absolute;left:50%;bottom:0;
    transform:translateX(-50%);width:18px;height:2px;background:var(--orange);}

  #bottombar{position:relative;z-index:6;padding:6px 0 calc(var(--safe-bottom) + 20px);
    background:var(--ink);display:flex;align-items:center;justify-content:space-around;}
  #thumb{position:relative;width:54px;height:54px;border-radius:12px;overflow:hidden;
    background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s;}
  #thumb:active{transform:scale(.9);}
  #thumb img,#thumb video{width:100%;height:100%;object-fit:cover;}
  #thumb .badge{position:absolute;top:-6px;right:-6px;background:var(--orange);color:#0a0a0a;
    font-family:var(--mono);font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;padding:0 5px;}
  #thumb .play{position:absolute;width:18px;height:18px;}

  #shutter{width:78px;height:78px;border-radius:50%;background:transparent;border:none;
    cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;}
  #shutter::before{content:"";position:absolute;inset:0;border-radius:50%;
    border:3px solid var(--text);box-shadow:0 0 24px rgba(255,106,26,.4);transition:box-shadow .2s;}
  #shutter::after{content:"";width:62px;height:62px;border-radius:50%;background:var(--text);
    transition:transform .15s, width .22s, height .22s, border-radius .22s, background .22s;}
  #shutter:active::after{transform:scale(.88);}
  #shutter.video::before{border-color:var(--orange);}
  #shutter.video::after{background:linear-gradient(145deg,var(--orange-bright),var(--orange-deep));}
  #shutter.rec::after{width:30px;height:30px;border-radius:8px;}
  @media (prefers-reduced-motion: no-preference){
    #shutter.video:not(.rec)::before{animation:breathe 2.6s ease-in-out infinite;}
  }
  @keyframes breathe{50%{box-shadow:0 0 34px rgba(255,106,26,.75);}}

  #flip{width:54px;height:54px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .4s;}
  #flip:active{transform:rotate(180deg);}
  #flip svg{width:25px;height:25px;stroke:var(--text);fill:none;stroke-width:1.6;}

  body.recording #modeSwitch,body.recording #flip,body.recording #thumb,
  body.recording #lenses,body.recording #btnTimer{opacity:.32;pointer-events:none;}

  /* スタート画面 */
  #start{position:absolute;inset:0;z-index:20;
    background:radial-gradient(120% 90% at 50% 28%,#2a1709 0%,#141414 46%,#070708 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:44px;gap:8px;}
  #start .mark{position:relative;display:inline-block;font-family:"Space Grotesk",sans-serif;
    font-size:58px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1;}
  #start .mark .dot{color:var(--orange);}
  #start .mark::before,#start .mark::after{content:"";position:absolute;width:15px;height:15px;border:2px solid var(--orange);}
  #start .mark::before{top:-13px;left:-17px;border-right:0;border-bottom:0;}
  #start .mark::after{bottom:-13px;right:-17px;border-left:0;border-top:0;}
  #start .tag{font-size:11px;letter-spacing:.46em;text-transform:uppercase;
    color:var(--orange);margin:20px 0 4px;padding-left:.46em;font-weight:600;}
  #start .sub{font-size:14px;line-height:1.75;color:var(--text-dim);max-width:300px;margin-top:18px;}
  #startBtn{margin-top:30px;background:linear-gradient(135deg,var(--orange-bright),var(--orange-deep));
    color:#0a0a0a;border:none;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    padding:15px 48px;border-radius:12px;cursor:pointer;transition:transform .12s;
    box-shadow:0 8px 30px rgba(255,106,26,.32);}
  #startBtn:active{transform:scale(.95);}
  #err{display:none;color:#ff8a7a;font-size:13.5px;line-height:1.7;max-width:320px;margin-top:14px;}

  /* シート共通 */
  .sheet{position:fixed;inset:0;z-index:30;background:var(--ink);display:none;flex-direction:column;}
  .sheet.show{display:flex;}
  .sheet-top{display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-top) + 14px) 20px 14px;border-bottom:1px solid var(--line);}
  .sheet-top .t-title{font-size:16px;font-weight:600;letter-spacing:.04em;}
  .sheet-top button{background:none;border:none;color:var(--orange);font-size:15px;font-weight:500;cursor:pointer;padding:6px;}

  #revstage{flex:1;overflow-x:auto;display:flex;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  #revstage::-webkit-scrollbar{display:none;}
  #revstage .slide{min-width:100%;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;padding:0 2px;}
  #revstage .slide img,#revstage .slide video{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;}
  #revbottom{display:flex;align-items:center;justify-content:space-around;padding:18px 0 calc(var(--safe-bottom) + 18px);}
  .revbtn{background:none;border:none;display:flex;flex-direction:column;gap:6px;align-items:center;
    color:var(--text);font-size:11px;letter-spacing:.05em;cursor:pointer;padding:6px 22px;transition:transform .12s;}
  .revbtn:active{transform:scale(.9);}
  .revbtn svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:1.6;}
  .revbtn.del{color:#ff7a6e;}
  .revbtn.del svg{stroke:#ff7a6e;}
  #revempty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:#6a6a6e;font-size:15px;}

  #setBody{flex:1;overflow-y:auto;padding:18px 22px 40px;-webkit-overflow-scrolling:touch;}
  #setBody .lead{font-size:13.5px;line-height:1.75;color:var(--text-dim);margin-bottom:20px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;font-weight:600;}
  .field input{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    color:var(--text);font-size:15px;padding:13px 14px;outline:none;transition:border .15s;}
  .field input:focus{border-color:var(--orange);}
  .row{display:flex;gap:12px;}
  .row .field{flex:1;}
  .toggle{display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:13px 14px;margin-bottom:16px;}
  .toggle span{font-size:14px;}
  .sw{width:48px;height:28px;border-radius:14px;background:#3a3a3e;position:relative;transition:.2s;cursor:pointer;flex:none;}
  .sw.on{background:var(--orange);}
  .sw::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:#fff;transition:.2s;}
  .sw.on::after{transform:translateX(20px);}
  .setbtns{display:flex;gap:12px;margin-top:8px;}
  .setbtns button{flex:1;border:1px solid var(--line);border-radius:12px;padding:14px;font-size:15px;font-weight:600;
    letter-spacing:.04em;cursor:pointer;transition:transform .12s;}
  .setbtns button:active{transform:scale(.96);}
  #setTest{background:var(--surface);color:var(--text);}
  #setSave{background:linear-gradient(135deg,var(--orange-bright),var(--orange-deep));color:#0a0a0a;border-color:transparent;}
  .warn{margin-top:22px;font-size:12px;line-height:1.7;color:#c8a99a;background:rgba(255,106,26,.07);
    border:1px solid rgba(255,106,26,.28);border-radius:10px;padding:13px 15px;}
  .warn b{color:var(--orange-bright);}
  .help{margin-top:16px;font-size:12px;line-height:1.7;color:var(--text-dim);}
  .help b{color:var(--text);}
  #setStatus{margin-top:14px;font-size:13px;min-height:18px;letter-spacing:.02em;}
  #setStatus.ok{color:#7fe0a0;} #setStatus.ng{color:#ff7a6e;}

  #toast{position:fixed;bottom:calc(var(--safe-bottom) + 132px);left:50%;
    transform:translateX(-50%) translateY(20px);z-index:60;
    background:rgba(20,20,22,.96);backdrop-filter:blur(10px);border:1px solid var(--line);
    color:var(--text);font-size:14px;padding:12px 20px;border-radius:12px;
    opacity:0;pointer-events:none;transition:.3s;max-width:86%;text-align:center;line-height:1.5;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #spin{position:fixed;inset:0;z-index:70;display:none;align-items:center;justify-content:center;
    background:rgba(8,8,9,.5);backdrop-filter:blur(2px);}
  #spin.show{display:flex;}
  #spin .ring{width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,.18);
    border-top-color:var(--orange);animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <video id="video" playsinline webkit-playsinline autoplay muted></video>
    <div id="grid"><span class="v" style="left:33.33%"></span><span class="v" style="left:66.66%"></span><span class="h" style="top:33.33%"></span><span class="h" style="top:66.66%"></span></div>
    <div id="frame"><i></i><i></i><i></i><i></i></div>
    <div id="flash"></div>
    <div id="count"></div>
    <div id="zoom">1.0×</div>
    <div id="lenses"></div>
    <div id="rectime"><span class="dot"></span><span id="rectimeText">0:00</span></div>

    <div id="topbar">
      <button class="pill" id="btnTorch" hidden aria-label="ライト"><svg viewBox="0 0 24 24"><path d="M9 2h6l-1 9h3l-8 11 1.5-8H7z"/></svg></button>
      <button class="pill" id="btnGrid" aria-label="グリッド"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg></button>
      <button class="pill" id="btnTimer" aria-label="タイマー"><svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M9 2h6"/></svg><span class="timerlabel" id="timerLabel"></span></button>
    </div>
  </div>

  <div id="modeSwitch">
    <button data-mode="photo" class="active">写真</button>
    <button data-mode="video">ビデオ</button>
  </div>

  <div id="bottombar">
    <div id="thumb" aria-label="撮影したもの"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7a6068" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>
    <button id="shutter" aria-label="撮影"></button>
    <button id="flip" aria-label="カメラ切替"><svg viewBox="0 0 24 24"><path d="M21 8a9 9 0 0 0-15-3L3 8M3 8V3M3 8h5"/><path d="M3 16a9 9 0 0 0 15 3l3-3M21 16v5M21 16h-5"/></svg></button>
  </div>

  <div id="start" style="display:none">
    <div class="mark">Sotto<span class="dot">.</span></div>
    <div class="tag">the quiet camera</div>
    <p class="sub">シャッター音の鳴らない、静かなカメラ。<br>はじめるを押すとカメラへのアクセスを確認します。</p>
    <button id="startBtn">はじめる</button>
    <p id="err"></p>
  </div>
</div>

<!-- レビュー -->
<div id="review" class="sheet">
  <div class="sheet-top">
    <button id="revClose">完了</button>
    <span class="t-title" id="revCount"></span>
    <span style="width:48px"></span>
  </div>
  <div id="revstage"></div>
  <div id="revempty">まだ何もありません</div>
  <div id="revbottom">
    <button class="revbtn" id="revSave"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>保存</button>
    <button class="revbtn del" id="revDel"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V4h6v3M6 7l1 14h10l1-14"/></svg>削除</button>
  </div>
</div>


<div id="toast"></div>

<script>
(function(){
  "use strict";
  const $=id=>document.getElementById(id);
  const video=$("video"), stage=$("stage"), startScreen=$("start"),
        startBtn=$("startBtn"), errEl=$("err"),
        flashEl=$("flash"), countEl=$("count"), zoomEl=$("zoom"),
        lensesEl=$("lenses"), rectimeEl=$("rectime"), rectimeText=$("rectimeText"),
        thumb=$("thumb"), shutter=$("shutter"), flip=$("flip"),
        btnTorch=$("btnTorch"), btnGrid=$("btnGrid"), btnTimer=$("btnTimer"),
        timerLabel=$("timerLabel"), gridEl=$("grid"),
        toastEl=$("toast"), modeSwitch=$("modeSwitch"),
        review=$("review"), revstage=$("revstage"), revCount=$("revCount"),
        revClose=$("revClose"), revSave=$("revSave"),
        revDel=$("revDel"), revEmpty=$("revempty");

  let stream=null, track=null,
      mode="photo", side="back",
      cams={back:[],front:[]}, enumerated=false, backDeviceId=null,
      zoomCaps=null, useOptical=false, zoom=1, maxDigital=5,
      torchOn=false, timerMode=0, timers=[0,3,10],
      recorder=null, recChunks=[], recMime="", recInt=null, recStart=0,
      items=[];

  let toastT;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"),2600); }

  /* ---------- カメラ起動 ---------- */
  function buildVideoConstraint(){
    const base={width:{ideal:4096},height:{ideal:2160}};
    if(side==="back" && backDeviceId) return Object.assign({deviceId:{exact:backDeviceId}}, base);
    return Object.assign({facingMode:{ideal: side==="front"?"user":"environment"}}, base);
  }
  async function requestStream(silent){
    if(!window.isSecureContext){ showError("カメラを使うにはHTTPS環境で開いてください。"); return; }
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ showError("このブラウザはカメラに対応していません。"); return; }
    try{
      if(stream) stream.getTracks().forEach(t=>t.stop());
      stage.classList.add("switching");
      const wantAudio=(mode==="video");
      const vc=buildVideoConstraint();
      try{ stream=await navigator.mediaDevices.getUserMedia({audio:wantAudio, video:vc}); }
      catch(e){ if(wantAudio){ stream=await navigator.mediaDevices.getUserMedia({audio:false, video:vc}); toast("マイクが使えないため無音で録画します"); } else throw e; }
      video.srcObject=stream; track=stream.getVideoTracks()[0];
      await video.play().catch(()=>{});
      startScreen.style.display="none";
      if(!enumerated) await enumerateCams();
      setupCaps();
      zoom = (useOptical && zoomCaps)? clamp(1, zoomCaps.min, zoomCaps.max) : 1;
      setZoom(zoom, true);
      buildLensUI();
      setTimeout(()=>stage.classList.remove("switching"),60);
    }catch(e){
      stage.classList.remove("switching");
      if(silent) return;
      if(e&&(e.name==="NotAllowedError"||e.name==="SecurityError")) showError("カメラへのアクセスが許可されませんでした。画面をタップするか、設定 > Safari > カメラ を確認してください。");
      else if(e&&e.name==="NotFoundError") showError("カメラが見つかりませんでした。");
      else showError("カメラを起動できませんでした: "+((e&&e.message)||e));
    }
  }
  function showError(m){ startScreen.style.display="flex"; errEl.style.display="block"; errEl.textContent=m; }

  async function enumerateCams(){
    try{
      const devs=await navigator.mediaDevices.enumerateDevices();
      const vids=devs.filter(d=>d.kind==="videoinput"), back=[], front=[];
      vids.forEach(d=>{ const l=(d.label||"").toLowerCase();
        if(/front|user|前面|self/.test(l)) front.push(d); else back.push(d); });
      cams.back=back.length?back:vids.slice(); cams.front=front; enumerated=true;
    }catch(e){}
  }
  function setupCaps(){
    torchOn=false; btnTorch.classList.remove("active");
    let caps={}; try{ caps=track.getCapabilities?track.getCapabilities():{}; }catch(e){}
    btnTorch.hidden=!(caps.torch && side==="back");
    if(side==="back" && caps.zoom && caps.zoom.max && caps.zoom.max>(caps.zoom.min||1)+0.05){
      zoomCaps={min:caps.zoom.min||1, max:caps.zoom.max, step:caps.zoom.step||0.1}; useOptical=true;
    }else{ zoomCaps=null; useOptical=false; maxDigital=5; }
  }
  function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }

  /* ---------- レンズ / ズーム UI ---------- */
  function presetStops(){
    const {min,max}=zoomCaps; const cand=[0.5,1,1.5,2,3,5,10];
    let s=cand.filter(v=>v>=min-1e-3 && v<=max+1e-3);
    if(!s.length || s[0]>min+0.05) s.unshift(Math.round(min*10)/10);
    if(s[s.length-1] < max-0.5) s.push(Math.round(max*10)/10);
    // 重複除去
    return s.filter((v,i)=>s.indexOf(v)===i);
  }
  function discreteLenses(){
    const back=cams.back, out=[];
    const uw=back.find(d=>/ultra.?wide/i.test(d.label));
    const tele=back.find(d=>/telephoto/i.test(d.label));
    const wide=back.find(d=>!/ultra.?wide|telephoto|dual|triple/i.test(d.label)) || back.find(d=>/wide|back camera/i.test(d.label)) || back[0];
    if(uw) out.push({name:"0.5×", id:uw.deviceId});
    if(wide) out.push({name:"1×", id:wide.deviceId});
    if(tele) out.push({name:"2×", id:tele.deviceId});
    // id重複除去
    const seen={}; return out.filter(o=>o.id && !seen[o.id] && (seen[o.id]=1));
  }
  function buildLensUI(){
    lensesEl.innerHTML="";
    if(side==="back" && useOptical && zoomCaps){
      presetStops().forEach(v=>{
        const b=document.createElement("button"); b.dataset.z=v;
        b.textContent=(v%1===0? v : v)+"×";
        b.addEventListener("click",()=>setZoom(v));
        lensesEl.appendChild(b);
      });
      lensesEl.classList.add("show"); markLensActive();
    }else if(side==="back"){
      const ls=discreteLenses();
      if(ls.length>1){
        ls.forEach(l=>{ const b=document.createElement("button"); b.dataset.id=l.id; b.textContent=l.name;
          b.addEventListener("click",()=>{ backDeviceId=l.id; requestStream(); });
          if(l.id===backDeviceId) b.classList.add("active");
          lensesEl.appendChild(b); });
        lensesEl.classList.add("show");
      }else lensesEl.classList.remove("show");
    }else lensesEl.classList.remove("show");
  }
  function markLensActive(){
    if(!(useOptical&&zoomCaps)) return;
    let best=null,bd=1e9;
    [...lensesEl.children].forEach(b=>{ const v=parseFloat(b.dataset.z); const d=Math.abs(v-zoom);
      b.classList.remove("active"); if(d<bd){bd=d;best=b;} });
    if(best) best.classList.add("active");
  }
  function setZoom(v, silent){
    if(useOptical && zoomCaps){
      zoom=clamp(v, zoomCaps.min, zoomCaps.max);
      try{ track.applyConstraints({advanced:[{zoom:zoom}]}); }catch(e){}
      video.style.transform = side==="front"?"scaleX(-1)":"";
      markLensActive();
    }else{
      zoom=clamp(v,1,maxDigital);
      video.style.transform=`scale(${zoom})`+(side==="front"?" scaleX(-1)":"");
    }
    zoomEl.textContent=(Math.round(zoom*10)/10).toFixed(1)+"×";
    if(!silent){ zoomEl.classList.add("show"); clearTimeout(setZoom._t); setZoom._t=setTimeout(()=>zoomEl.classList.remove("show"),1100); }
  }
  let pinchStart=0,pinchBase=1;
  stage.addEventListener("touchstart",e=>{ if(e.touches.length===2){ pinchStart=dist(e.touches); pinchBase=zoom; }},{passive:true});
  stage.addEventListener("touchmove",e=>{ if(e.touches.length===2&&pinchStart){ setZoom(pinchBase*(dist(e.touches)/pinchStart)); e.preventDefault(); }},{passive:false});
  stage.addEventListener("touchend",e=>{ if(e.touches.length<2) pinchStart=0; });
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  let lastTap=0;
  stage.addEventListener("touchend",e=>{ if(e.touches.length>0)return; const n=Date.now(); if(n-lastTap<280){ setZoom(zoom>1.5?1:2); } lastTap=n; });

  /* ---------- 写真(無音) ---------- */
  function doCapture(){
    if(!track) return; const vw=video.videoWidth, vh=video.videoHeight;
    if(!vw||!vh){ toast("カメラ準備中です"); return; }
    const z=useOptical?1:zoom, cw=vw/z, ch=vh/z, sx=(vw-cw)/2, sy=(vh-ch)/2;
    const c=document.createElement("canvas"); c.width=cw; c.height=ch; const x=c.getContext("2d");
    if(side==="front"){ x.translate(cw,0); x.scale(-1,1); }
    x.drawImage(video, sx,sy,cw,ch, 0,0,cw,ch);
    flashEl.classList.remove("fire"); void flashEl.offsetWidth; flashEl.classList.add("fire");
    if(navigator.vibrate) navigator.vibrate(8);
    c.toBlob(b=>{ if(!b){ toast("撮影に失敗しました"); return; } addItem({type:"photo",blob:b,ext:"jpg"}); },"image/jpeg",0.95);
  }
  function capturePhoto(){
    if(timerMode===0){ doCapture(); return; }
    let n=timers[timerMode]; countEl.classList.add("show"); countEl.textContent=n;
    const iv=setInterval(()=>{ n--; if(n<=0){ clearInterval(iv); countEl.classList.remove("show"); doCapture(); } else countEl.textContent=n; },1000);
  }

  /* ---------- 動画 ---------- */
  function pickMime(){ const c=["video/mp4","video/mp4;codecs=avc1.42E01E,mp4a.40.2","video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"];
    for(const m of c){ try{ if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return m; }catch(e){} } return ""; }
  function startRec(){
    if(!stream||!window.MediaRecorder){ toast("この端末は録画に対応していません"); return; }
    recChunks=[]; recMime=pickMime();
    try{ recorder=recMime?new MediaRecorder(stream,{mimeType:recMime}):new MediaRecorder(stream); }
    catch(e){ try{ recorder=new MediaRecorder(stream); }catch(e2){ toast("録画を開始できませんでした"); return; } }
    recorder.ondataavailable=e=>{ if(e.data&&e.data.size) recChunks.push(e.data); };
    recorder.onstop=()=>{ const type=(recorder&&recorder.mimeType)||recMime||"video/mp4";
      addItem({type:"video", blob:new Blob(recChunks,{type}), ext:/mp4/.test(type)?"mp4":"webm"}); };
    recorder.start(); recStart=Date.now();
    document.body.classList.add("recording"); shutter.classList.add("rec");
    rectimeEl.classList.add("show"); tickRec(); recInt=setInterval(tickRec,250);
    if(navigator.vibrate) navigator.vibrate(12);
  }
  function tickRec(){ const s=Math.floor((Date.now()-recStart)/1000); rectimeText.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
  function stopRec(){ if(recorder&&recorder.state!=="inactive"){ try{ recorder.stop(); }catch(e){} }
    clearInterval(recInt); document.body.classList.remove("recording"); shutter.classList.remove("rec"); rectimeEl.classList.remove("show");
    if(navigator.vibrate) navigator.vibrate(12); }

  /* ---------- アイテム / サムネ ---------- */
  function addItem(it){ it.url=URL.createObjectURL(it.blob); items.unshift(it); updateThumb(); }
  function updateThumb(){
    thumb.innerHTML="";
    if(items.length){ const it=items[0];
      if(it.type==="photo"){ const i=document.createElement("img"); i.src=it.url; thumb.appendChild(i); }
      else{ const v=document.createElement("video"); v.src=it.url; v.muted=true; v.playsInline=true; v.preload="metadata"; thumb.appendChild(v);
        const p=document.createElement("span"); p.className="play"; p.innerHTML='<svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>'; thumb.appendChild(p); }
      if(items.length>1){ const b=document.createElement("span"); b.className="badge"; b.textContent=items.length; thumb.appendChild(b); }
    }else thumb.innerHTML='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7a6068" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
  }

  /* ---------- レビュー ---------- */
  function openReview(){ if(!items.length){ toast("まだ何もありません"); return; } renderReview(); review.classList.add("show"); revstage.scrollLeft=0; }
  function renderReview(){ revstage.innerHTML="";
    if(!items.length){ revEmpty.style.display="flex"; revCount.textContent=""; return; }
    revEmpty.style.display="none";
    items.forEach(it=>{ const s=document.createElement("div"); s.className="slide";
      if(it.type==="photo"){ const i=document.createElement("img"); i.src=it.url; s.appendChild(i); }
      else{ const v=document.createElement("video"); v.src=it.url; v.controls=true; v.playsInline=true; s.appendChild(v); }
      revstage.appendChild(s); }); updateRevCount(); }
  function curIdx(){ return Math.round(revstage.scrollLeft/revstage.clientWidth); }
  function updateRevCount(){ revCount.textContent=`${Math.min(curIdx()+1,items.length)} / ${items.length}`; }
  revstage.addEventListener("scroll",()=>{ if(items.length) updateRevCount(); });
  revClose.addEventListener("click",()=>review.classList.remove("show"));

  async function save(){ if(!items.length) return; const it=items[curIdx()];
    const fn=(it.type==="photo"?"photo_":"video_")+stamp()+"."+it.ext;
    const file=new File([it.blob],fn,{type:it.blob.type||(it.type==="photo"?"image/jpeg":"video/mp4")});
    if(navigator.canShare && navigator.canShare({files:[file]})){ try{ await navigator.share({files:[file]}); }catch(e){} }
    else{ const a=document.createElement("a"); a.href=it.url; a.download=fn; document.body.appendChild(a); a.click(); a.remove(); toast("ダウンロードしました"); } }
  revSave.addEventListener("click",save);
  revDel.addEventListener("click",()=>{ if(!items.length) return; const i=curIdx(); URL.revokeObjectURL(items[i].url); items.splice(i,1); updateThumb();
    if(!items.length){ review.classList.remove("show"); return; } renderReview(); revstage.scrollLeft=Math.min(i,items.length-1)*revstage.clientWidth; });

  /* ---------- 保存ファイル名 ---------- */
  function stamp(){ const d=new Date(),p=n=>String(n).padStart(2,"0");
    return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+"_"+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds())+"_"+String(d.getMilliseconds()).padStart(3,"0"); }

  /* ---------- 上部 / モード / 操作 ---------- */
  btnGrid.addEventListener("click",()=>{ gridEl.classList.toggle("on"); btnGrid.classList.toggle("active",gridEl.classList.contains("on")); });
  btnTimer.addEventListener("click",()=>{ timerMode=(timerMode+1)%3; if(timerMode===0){ btnTimer.classList.remove("active"); timerLabel.textContent=""; } else { btnTimer.classList.add("active"); timerLabel.textContent=timers[timerMode]; } });
  btnTorch.addEventListener("click",async()=>{ if(!track) return; torchOn=!torchOn; try{ await track.applyConstraints({advanced:[{torch:torchOn}]}); btnTorch.classList.toggle("active",torchOn); }catch(e){ torchOn=false; toast("この端末ではライトを使えません"); } });
  shutter.addEventListener("click",()=>{ if(mode==="photo") capturePhoto(); else (recorder&&recorder.state==="recording")?stopRec():startRec(); });
  modeSwitch.addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b) return; const m=b.dataset.mode; if(m===mode) return;
    if(recorder&&recorder.state==="recording") return; mode=m;
    [...modeSwitch.children].forEach(x=>x.classList.toggle("active",x.dataset.mode===m));
    shutter.classList.toggle("video",m==="video"); btnTimer.style.display=(m==="video")?"none":"flex"; requestStream(); });
  thumb.addEventListener("click",openReview);
  flip.addEventListener("click",()=>{ if(recorder&&recorder.state==="recording") return; side=side==="back"?"front":"back"; backDeviceId=null; requestStream(); });
  startBtn.addEventListener("click",()=>{ errEl.style.display="none"; boot(false); });
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden && video.srcObject) video.play().catch(()=>{}); });

  // 「はじめる」画面なし: 読み込み時に自動起動。ブロックされたら最初のタップで起動。
  let booting=false;
  async function boot(silent){ if(booting||stream) return; booting=true; try{ await requestStream(silent); } finally{ booting=false; } }
  function onFirstGesture(){ if(!stream) boot(false); }
  document.addEventListener("click", onFirstGesture);
  document.addEventListener("touchend", onFirstGesture, {passive:true});
  boot(true);
})();
</script>
</body>
</html>
